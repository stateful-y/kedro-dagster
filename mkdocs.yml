site_name: Kedro-Dagster
site_description: Seamless integration between Kedro and Dagster
site_url: https://kedro-dagster.readthedocs.io/
repo_url: https://github.com/stateful-y/kedro-dagster
repo_name: stateful-y/kedro-dagster
edit_uri: edit/main/docs/

hooks:
  - docs/hooks.py

theme:
  name: material
  custom_dir: docs/material/overrides
  favicon: assets/favicon.png
  logo: assets/logo.png

  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - sane_lists
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - class: mermaid
          name: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji

extra_javascript:
  - javascripts/readthedocs.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/2.2.2/js/dataTables.min.js

extra_css:
  - stylesheets/theme.css
  - https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css

exclude_docs: |
  api-submodule.html

not_in_nav: |
  assets/README.md
  pages/api/*.md
  pages/api/generated/*.md

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: ignore

plugins:
  - search
  - tags
  - autorefs
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - custom-skip-class-name
      auto_caption: true
      caption_position: bottom
      background: white
      shadow: true
      manual: false
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            signature_crossrefs: true
            scoped_crossrefs: true
            relative_crossrefs: true

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: pages/tutorials/getting-started.md
    - Example Project: pages/tutorials/example-project.md
  - How-to Guides:
    - Configure Logging: pages/how-to/configure-logging.md
    - Integrate MLflow: pages/how-to/integrate-mlflow.md
    - Use Partitions: pages/how-to/use-partitions.md
    - Troubleshooting: pages/how-to/troubleshooting.md
    - Contributing: pages/how-to/contribute.md
  - Reference:
    - API: pages/reference/api.md
    - Configuration: pages/reference/configuration.md
  - Explanation:
    - Concepts: pages/explanation/concepts.md
    - Architecture: pages/explanation/architecture.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stateful-y/kedro-dagster

watch:
  - mkdocs.yml
  - docs
